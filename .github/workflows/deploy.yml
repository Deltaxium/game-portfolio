name: Deploy portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cinderworks/package-lock.json
            dustfall-trails/package-lock.json
            blackwake-tactics/package-lock.json
            stormwake-isles/package-lock.json

      - name: Install Cinderworks dependencies
        run: npm ci
        working-directory: cinderworks

      - name: Build Cinderworks
        run: npm run build
        working-directory: cinderworks

      - name: Install Dustfall Trails dependencies
        run: npm ci
        working-directory: dustfall-trails

      - name: Build Dustfall Trails
        run: npm run build
        working-directory: dustfall-trails

      - name: Install Blackwake Tactics dependencies
        run: npm ci
        working-directory: blackwake-tactics

      - name: Build Blackwake Tactics
        run: npm run build
        working-directory: blackwake-tactics

      - name: Install Stormwake Isles dependencies
        run: npm ci
        working-directory: stormwake-isles

      - name: Build Stormwake Isles
        run: npm run build
        working-directory: stormwake-isles

      - name: Build combined website
        run: node scripts/build-site.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

      - name: Upload Firebase artifact
        uses: actions/upload-artifact@v4
        with:
          name: firebase-dist
          path: site-dist

  github-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  firebase-hosting:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Firebase artifact
        uses: actions/download-artifact@v4
        with:
          name: firebase-dist
          path: site-dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAME_PORTFOLIO_DELTAXIUM }}
          projectId: game-portfolio-deltaxium
          channelId: live
