<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Placeholder page for the unnamed game prototype in Game Studio."
    />
    <title>Unnamed Game</title>
    <style>
      :root {
        color: #f7f2df;
        background: #111416;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(17, 20, 22, 0.88), #111416 64%),
          radial-gradient(circle at 18% 16%, rgba(115, 191, 115, 0.22), transparent 32%),
          #111416;
      }

      main {
        display: grid;
        align-content: center;
        gap: 24px;
        width: min(860px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .eyebrow {
        margin: 0;
        color: #73bf73;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #fff8e7;
        font-size: clamp(3rem, 9vw, 6.5rem);
        line-height: 0.92;
      }

      p {
        max-width: 620px;
        margin: 0;
        color: #cbd1cc;
        font-size: 1.08rem;
        line-height: 1.6;
      }

      a {
        color: inherit;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-height: 48px;
        padding: 0 18px;
        border: 1px solid rgba(255, 248, 231, 0.22);
        border-radius: 8px;
        background: #f5df9b;
        color: #241914;
        font-weight: 800;
        text-decoration: none;
      }

      .back-link:focus-visible,
      .back-link:hover {
        background: #73bf73;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">New game folder</p>
      <h1>Unnamed</h1>
      <p>
        This placeholder page keeps the new game reachable from the portfolio while the prototype is
        being defined.
      </p>
      <a class="back-link" href="../">Back to Game Studio</a>
    </main>
  </body>
</html>
